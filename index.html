<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="app.js"></script>
<script rel="stylesheet" src="idex.css"></script>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <title>Task Manager</title>
</head>
<body>

    <section>
        <div class="card p-4 shadow border-0 rounded-4 mx-auto" >

            <h3 class="text-center mb-3">Add Task</h3>
            <form id="form">
               
                <div class="mb-3 d-flex justify-content-center">
                    <div style="width: 75%;">
                        <label>Name:</label>
                        <input id="name" type="text" class="form-control rounded-3 shadow-sm w-75">
                    </div>    
                </div>
                
                <div class="mb-3 d-flex justify-content-center">
                    <div style="width: 75%;">
                        <label>Category:</label>
                        <input id="category" type="text" class="form-control rounded-3 shadow-sm">
                    </div>
                </div>

                <div class="mb-3">
                     <label>Deadline:</label>
                     <input id="deadline" type="date" >
                </div>

                <div class="text-center">
                    <button id="addTask" t class="btn btn-primary rounded-pill px-4 py-2 shadow-sm" ">Add Task</button>
                </div>
            </form>

            

           
        </div>
    </section>

    <section>
        <div class="d-flex gap-2 justify-content-center">
             <select id="filterStatus">
                <option value="All">All</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
                <option value="Overdue">Overdue</option>
            </select>

            <select id="filterCategory">
                <option value="All">All</option>
            </select>
        </div>
    </section>

    <section>
        <div id="status" class="d-none">
            <select>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
        <div>
            <ul id="list"></ul>
        </div>
    </section>
    
</body>
</html>
